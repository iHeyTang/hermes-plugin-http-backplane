manifest_version: 1
name: hermes-plugin-http-backplane
version: 0.1.0
description: >
  Hermes plugin that hosts a local HTTP server for clients (browser
  extensions, future apps). Exposes /hermes/* wrappers over Hermes core
  (cron, sessions, model catalog, settings, memory, skills, conversation
  attachments) and serves /integrations/<name>/* for built-in presets
  (e.g. lark) plus user integrations under ~/.hermes/integrations/.
  Integration lifecycle (install / remove / reload / list) is operator-
  facing: use the standalone ``hermes-integration`` CLI shipped by this
  package, not agent tools.
author: "iHeyTang"
kind: standalone
provides_tools: []
hooks: []
